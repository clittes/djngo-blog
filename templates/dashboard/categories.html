{% extends 'base.html' %}
{% block content %}
<div class="row">
    <!-- left sidebar -->
    <!-- load the sidebar here -->
    {% include 'dashboard/sidebar.html' %}
     <!-- Right sidebar -->
      <div class="col-md-9">
        <h3>All Categories</h3>
        <a href="{% url 'add_category' %}" class="btn btn-dark text-light float-right mb-2">Add new</a>
        <table class="table table-hover">
  <thead>
    <tr>
      <th>#</th>
      <th scope="col">Category Name</th>
      <th>Created at</th>
      <th>Updatted at</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody>
    {% for cat in categories %}
    <tr>
      <td>{{forloop.counter}}</th>
      <td>{{cat}}</td>
      <td>{{cat.created_at}}</td>
      <td>{{cat.updated_at}}</td>
      <td>
        <a href="{% url 'edit_category' cat.id %}"><i class="fas fa-edit text-success" style="font-size:16px;"></i></a>
        &nbsp;
        <a href="{% url 'delete_category' cat.id %}"><i class="fas fa-trash text-danger"></i></a>
    </td>
    </tr>
    {% endfor %}


  </tbody>
</table>
      </div>
</div>
{% endblock %}
